name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --skip=homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke test published install script
        env:
          ACD_INSTALL_DIR: ${{ runner.temp }}/acd-smoke-bin
          ACD_VERSION: ${{ github.ref_name }}
        run: |
          bash scripts/install.sh
          "$ACD_INSTALL_DIR/acd" version
