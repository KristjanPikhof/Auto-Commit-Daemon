name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: make lint
      - run: make test
      - run: make build

  race-stress:
    # Linux-only race lane that catches ordering bugs the macOS runners miss
    # (real instances captured: internal/git/ignore.go cancellation goroutine
    # racing with Check mutex). Failures here should be treated as real bugs
    # by default; see CLAUDE.md "Pre-merge verification" for the playbook.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true
      - name: race + count=3 stress on concurrency-prone packages
        run: go test ./internal/daemon/... ./internal/git/... ./internal/state/... -race -count=3 -timeout 10m
