# acd-managed: true
hooks:
  - id: acd-start
    event: session.created
    actions:
      - bash: |
          acd start \
            --session-id "${PI_SESSION_ID:-$(uuidgen)}" \
            --harness pi \
            --watch-pid "$PPID" \
            --repo "$PI_PROJECT_DIR"

  - id: acd-wake-tool-before
    event: tool.before.*
    actions:
      - bash: |
          acd wake \
            --session-id "${PI_SESSION_ID:-unknown}" \
            --repo "$PI_PROJECT_DIR"

  - id: acd-wake-tool-after
    event: tool.after.*
    actions:
      - bash: |
          acd wake \
            --session-id "${PI_SESSION_ID:-unknown}" \
            --repo "$PI_PROJECT_DIR"

  - id: acd-touch-idle
    event: session.idle
    actions:
      - bash: |
          acd touch \
            --session-id "${PI_SESSION_ID:-unknown}" \
            --repo "$PI_PROJECT_DIR"

  - id: acd-stop
    event: session.deleted
    actions:
      - bash: |
          acd stop \
            --session-id "${PI_SESSION_ID:-unknown}" \
            --repo "$PI_PROJECT_DIR"
