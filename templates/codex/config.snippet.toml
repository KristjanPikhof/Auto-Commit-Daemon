# acd-managed: true
#
# acd registers a daemon at SessionStart with watch_pid set to Codex's own
# PID. When Codex exits, the daemon's refcount sweep detects the dead pid,
# drops the client row, and self-terminates after BootGrace + 2 empty sweeps
# (~30-60s). No Stop hook is wired — racing Stop with PostToolUse causes the
# daemon to shut down before the last capture+replay drains.

[features]
codex_hooks = true

[[hooks.SessionStart]]
[[hooks.SessionStart.hooks]]
type = "command"
command = "bash -c 'LOG=\"${XDG_STATE_HOME:-$HOME/.local/state}/acd/codex-hook.log\"; mkdir -p \"$(dirname \"$LOG\")\"; SID=$(jq -r .session_id <&0 2>>\"$LOG\"); REPO=\"${CODEX_PROJECT_DIR:-$PWD}\"; acd start --session-id \"$SID\" --harness codex --watch-pid \"$PPID\" --repo \"$REPO\" >/dev/null 2>>\"$LOG\"; rc=$?; printf \"{}\\n\"; exit \"$rc\"'"

[[hooks.PreToolUse]]
[[hooks.PreToolUse.hooks]]
type = "command"
command = "bash -c 'LOG=\"${XDG_STATE_HOME:-$HOME/.local/state}/acd/codex-hook.log\"; mkdir -p \"$(dirname \"$LOG\")\"; SID=$(jq -r .session_id <&0 2>>\"$LOG\"); REPO=\"${CODEX_PROJECT_DIR:-$PWD}\"; acd wake --session-id \"$SID\" --repo \"$REPO\" >/dev/null 2>>\"$LOG\"; rc=$?; printf \"{}\\n\"; exit \"$rc\"'"

[[hooks.PostToolUse]]
[[hooks.PostToolUse.hooks]]
type = "command"
command = "bash -c 'LOG=\"${XDG_STATE_HOME:-$HOME/.local/state}/acd/codex-hook.log\"; mkdir -p \"$(dirname \"$LOG\")\"; SID=$(jq -r .session_id <&0 2>>\"$LOG\"); REPO=\"${CODEX_PROJECT_DIR:-$PWD}\"; acd wake --session-id \"$SID\" --repo \"$REPO\" >/dev/null 2>>\"$LOG\"; rc=$?; printf \"{}\\n\"; exit \"$rc\"'"
